<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <title id="app-title">App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <button id="menu-toggle" class="icon-btn" aria-label="Меню">
          <span class="hamburger"></span>
        </button>
        <h1 id="header-title"></h1>
      </div>
      <div class="header-right" id="header-actions"></div>
    </header>

    <nav id="sidebar">
      <div class="sidebar-brand">
        <span id="sidebar-logo"></span>
        <span id="sidebar-name"></span>
      </div>
      <ul id="nav-list"></ul>
      <div class="sidebar-footer">v<span id="app-version"></span></div>
    </nav>

    <div id="overlay"></div>

    <main id="content">
      <div id="page-container"></div>
    </main>
  </div>

  <script src="modules/dashboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
